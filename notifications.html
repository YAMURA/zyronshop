<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cluddy Shop | Notifications</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background: radial-gradient(circle at 20% 15%, rgba(147,51,234,0.15), rgba(0,0,0,0) 42%), linear-gradient(135deg, #07070a 0%, #0b0b12 45%, #07070a 100%); min-height: 100vh; }
        .glass-card { background: rgba(10,14,28,0.6); backdrop-filter: blur(14px); border: 1px solid rgba(147,51,234,0.16); border-radius: 24px; }
        .sidebar { position: fixed; left: 0; top: 0; width: 280px; height: 100%; background: rgba(10,14,28,0.95); backdrop-filter: blur(18px); border-right: 1px solid rgba(147,51,234,0.2); transform: translateX(-100%); transition: transform 0.3s ease; z-index: 100; }
        .sidebar.open { transform: translateX(0); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 99; }
        .overlay.active { display: block; }
        @media (min-width: 1024px) { .sidebar { transform: translateX(0); } .menu-toggle { display: none; } main { margin-left: 280px; } }
        @media (max-width: 1024px) { main { margin-left: 0; } }
        .nav-item { transition: all 0.3s ease; }
        .nav-item:hover { background: rgba(147,51,234,0.1); transform: translateX(5px); }
        .nav-item.active { background: rgba(147,51,234,0.2); color: #c084fc; }
        .glass-header { background: rgba(10,14,28,0.85); backdrop-filter: blur(18px); border-bottom: 1px solid rgba(147,51,234,0.2); }
        .notification-unread { background: rgba(147,51,234,0.1); border-left: 3px solid #9333ea; }
        .music-player { position: fixed; bottom: 20px; left: 20px; z-index: 1000; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 8px 12px; border-radius: 40px; border: 1px solid rgba(147,51,234,0.3); display: flex; align-items: center; gap: 10px; cursor: pointer; transition: all 0.3s ease; }
        .music-player:hover { transform: scale(1.05); border-color: rgba(147,51,234,0.6); }
        @keyframes musicPulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
        .music-playing { animation: musicPulse 1s ease-in-out infinite; }
    </style>
</head>
<body>
    <div class="music-player" id="musicPlayer" onclick="toggleMusic()"><i id="musicIcon" class="bi bi-music-note"></i><span id="musicText">Play Music</span></div>
    <audio id="bgMusic" loop><source id="musicSource" src="" type="audio/mpeg"></audio>

    <div class="sidebar" id="sidebar"><div class="p-6"><div class="flex items-center gap-3 mb-8"><div class="w-10 h-10 bg-gradient-to-br from-purple-500 to-blue-500 rounded-xl flex items-center justify-center"><i class="bi bi-shop text-white text-xl"></i></div><span class="text-white font-bold text-xl">Cluddy Shop</span></div><nav class="space-y-2"><a href="dashboard.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-white/5 transition"><i class="bi bi-speedometer2"></i> Dashboard</a><a href="products.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-white/5 transition"><i class="bi bi-grid-3x3-gap-fill"></i> Products</a><a href="deposit.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-white/5 transition"><i class="bi bi-wallet2"></i> Deposit</a><a href="status.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-white/5 transition"><i class="bi bi-activity"></i> Status</a><a href="mykeys.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-white/5 transition"><i class="bi bi-key"></i> My Keys</a><a href="orders.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-white/5 transition"><i class="bi bi-receipt"></i> Orders</a><a href="notifications.html" class="nav-item active flex items-center gap-3 px-4 py-3 rounded-xl"><i class="bi bi-bell"></i> Notifications</a><hr class="border-white/10 my-4"><a href="#" onclick="logout()" class="flex items-center gap-3 px-4 py-3 rounded-xl text-red-400 hover:bg-red-500/10 transition"><i class="bi bi-box-arrow-right"></i> Logout</a></nav></div></div>
    
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

    <main class="p-4 md:p-6 transition-all">
        <div class="glass-header sticky top-0 z-50 rounded-2xl p-4 mb-6 flex justify-between items-center"><button class="menu-toggle text-white text-2xl" onclick="toggleSidebar()"><i class="bi bi-list"></i></button><div class="flex items-center gap-4"><div class="text-right hidden sm:block"><div class="text-white text-sm font-semibold" id="userName">Loading...</div><div class="text-green-400 text-xs">Balance: ₱<span id="userBalance">0</span></div></div><div class="w-10 h-10 bg-gradient-to-br from-purple-500 to-blue-500 rounded-full flex items-center justify-center"><i class="bi bi-person text-white"></i></div></div></div>

        <div class="glass-card p-6 mb-6"><div class="flex justify-between items-center"><div><h1 class="text-2xl md:text-3xl font-bold text-white mb-2">🔔 Notifications</h1><p class="text-gray-400">Stay updated with your order status and announcements</p></div><button onclick="markAllRead()" class="text-sm text-purple-400 hover:text-purple-300">Mark all as read</button></div></div>

        <div class="glass-card p-6"><div id="notificationsList" class="space-y-3"><p class="text-gray-400 text-center py-8">No notifications yet.</p></div></div>
    </main>

    <script>
        let currentUser = null, notifications = [], isMusicPlaying = false;
        document.addEventListener('DOMContentLoaded', () => {
            const userData = localStorage.getItem('cluddy_current_user');
            if (!userData) { window.location.href = 'login.html'; return; }
            currentUser = JSON.parse(userData);
            document.getElementById('userName').textContent = currentUser.fullname || currentUser.username;
            document.getElementById('userBalance').textContent = currentUser.balance || 0;
            loadNotifications();
            loadMusic();
        });
        function loadMusic() { const musicUrl = localStorage.getItem('cluddy_music_url'); if (musicUrl) { document.getElementById('musicSource').src = musicUrl; document.getElementById('bgMusic').load(); } }
        function toggleMusic() { const music = document.getElementById('bgMusic'); const icon = document.getElementById('musicIcon'); const text = document.getElementById('musicText'); const musicUrl = localStorage.getItem('cluddy_music_url'); if (isMusicPlaying) { music.pause(); icon.className = 'bi bi-music-note'; text.textContent = 'Play Music'; icon.style.animation = 'none'; } else { if (musicUrl) { music.play().catch(e => console.log('Playback failed:', e)); icon.className = 'bi bi-music-note-beamed music-playing'; text.textContent = 'Playing...'; } } isMusicPlaying = !isMusicPlaying; }
        function loadNotifications() { let savedNotifications = JSON.parse(localStorage.getItem(`cluddy_notifications_${currentUser.id}`)) || []; const orders = JSON.parse(localStorage.getItem('cluddy_orders')) || []; const userOrders = orders.filter(o => o.userId === currentUser.id); userOrders.forEach(order => { const existing = savedNotifications.find(n => n.orderId === order.orderId); if (!existing) { savedNotifications.push({ id: Date.now() + Math.random(), orderId: order.orderId, type: order.status === 'approved' ? 'success' : order.status === 'declined' ? 'error' : 'info', title: `Order ${order.status.toUpperCase()}`, message: `Your order for ${order.productName} has been ${order.status}.`, timestamp: order.timestamp, read: false }); } else if (existing.title !== `Order ${order.status.toUpperCase()}`) { existing.title = `Order ${order.status.toUpperCase()}`; existing.message = `Your order for ${order.productName} has been ${order.status}.`; existing.timestamp = order.timestamp; existing.read = false; } }); const deposits = JSON.parse(localStorage.getItem('cluddy_deposits')) || []; const userDeposits = deposits.filter(d => d.userId === currentUser.id); userDeposits.forEach(deposit => { const existing = savedNotifications.find(n => n.depositId === deposit.id); if (!existing && deposit.status !== 'pending') { savedNotifications.push({ id: Date.now() + Math.random(), depositId: deposit.id, type: deposit.status === 'approved' ? 'success' : 'error', title: `Deposit ${deposit.status.toUpperCase()}`, message: `Your deposit of ₱${deposit.amount} has been ${deposit.status}.`, timestamp: deposit.timestamp, read: false }); } }); savedNotifications.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)); localStorage.setItem(`cluddy_notifications_${currentUser.id}`, JSON.stringify(savedNotifications)); notifications = savedNotifications; displayNotifications(); }
        function displayNotifications() { const container = document.getElementById('notificationsList'); if (notifications.length === 0) { container.innerHTML = '<p class="text-gray-400 text-center py-8">No notifications yet.</p>'; return; } container.innerHTML = notifications.map(notif => { let icon = 'bi-info-circle', iconColor = 'text-blue-400'; if (notif.type === 'success') { icon = 'bi-check-circle-fill'; iconColor = 'text-green-400'; } else if (notif.type === 'error') { icon = 'bi-x-circle-fill'; iconColor = 'text-red-400'; } return `<div class="p-4 rounded-xl bg-white/5 ${!notif.read ? 'notification-unread' : ''}" onclick="markRead('${notif.id}')"><div class="flex gap-3"><i class="bi ${icon} ${iconColor} text-xl"></i><div class="flex-1"><div class="flex justify-between items-start"><h3 class="text-white font-semibold">${notif.title}</h3><span class="text-gray-500 text-xs">${new Date(notif.timestamp).toLocaleString()}</span></div><p class="text-gray-400 text-sm mt-1">${notif.message}</p></div></div></div>`; }).join(''); }
        function markRead(notificationId) { const notif = notifications.find(n => n.id == notificationId); if (notif && !notif.read) { notif.read = true; localStorage.setItem(`cluddy_notifications_${currentUser.id}`, JSON.stringify(notifications)); displayNotifications(); } }
        function markAllRead() { notifications.forEach(n => n.read = true); localStorage.setItem(`cluddy_notifications_${currentUser.id}`, JSON.stringify(notifications)); displayNotifications(); showNotification('All notifications marked as read', 'success'); }
        function showNotification(msg, type) { const notification = document.createElement('div'); notification.className = `fixed top-4 right-4 px-4 py-3 rounded-xl shadow-lg z-50 transition-all ${type === 'success' ? 'bg-green-500' : 'bg-red-500'} text-white`; notification.innerHTML = `<i class="bi bi-${type === 'success' ? 'check-circle' : 'x-circle'} mr-2"></i>${msg}`; document.body.appendChild(notification); setTimeout(() => notification.remove(), 3000); }
        function logout() { localStorage.removeItem('cluddy_current_user'); window.location.href = 'login.html'; }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('active'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('active'); }
    </script>
</body>
</html>
