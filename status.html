<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zyron Shop | Product Status</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background: radial-gradient(circle at 20% 15%, rgba(147,51,234,0.15), rgba(0,0,0,0) 42%), linear-gradient(135deg, #07070a 0%, #0b0b12 45%, #07070a 100%); min-height: 100vh; }
        .glass-card { background: rgba(10,14,28,0.6); backdrop-filter: blur(14px); border: 1px solid rgba(147,51,234,0.16); border-radius: 24px; }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-active { background: rgba(16,185,129,0.2); color: #34d399; }
        .status-maintenance { background: rgba(245,158,11,0.2); color: #fbbf24; }
        .category-header { cursor: pointer; transition: all 0.3s ease; }
        .category-header:hover { background: rgba(147,51,234,0.1); }
        .category-content { display: none; }
        .category-content.open { display: block; }
        .chevron { transition: transform 0.3s ease; }
        .chevron.rotated { transform: rotate(180deg); }
        
        .sidebar { position: fixed; left: 0; top: 0; width: 280px; height: 100%; background: rgba(10,14,28,0.95); backdrop-filter: blur(18px); border-right: 1px solid rgba(147,51,234,0.2); transform: translateX(-100%); transition: transform 0.3s ease; z-index: 100; }
        .sidebar.open { transform: translateX(0); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 99; }
        .overlay.active { display: block; }
        @media (min-width: 1024px) { .sidebar { transform: translateX(0); } .menu-toggle { display: none; } main { margin-left: 280px; } }
        @media (max-width: 1024px) { main { margin-left: 0; } }
        .nav-item { transition: all 0.3s ease; }
        .nav-item:hover { background: rgba(147,51,234,0.1); transform: translateX(5px); }
        .nav-item.active { background: rgba(147,51,234,0.2); color: #c084fc; }
        .glass-header { background: rgba(10,14,28,0.85); backdrop-filter: blur(18px); border-bottom: 1px solid rgba(147,51,234,0.2); }
        
        .music-player { position: fixed; bottom: 20px; left: 20px; z-index: 1000; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 8px 12px; border-radius: 40px; border: 1px solid rgba(147,51,234,0.3); display: flex; align-items: center; gap: 10px; cursor: pointer; transition: all 0.3s ease; }
        .music-player:hover { transform: scale(1.05); border-color: rgba(147,51,234,0.6); }
        @keyframes musicPulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
        .music-playing { animation: musicPulse 1s ease-in-out infinite; }
    </style>
</head>
<body>
    <div class="music-player" id="musicPlayer" onclick="toggleMusic()"><i id="musicIcon" class="bi bi-music-note"></i><span id="musicText">Play Music</span></div>
    <audio id="bgMusic" loop><source id="musicSource" src="" type="audio/mpeg"></audio>

    <div class="sidebar" id="sidebar">
        <div class="p-6">
            <div class="flex items-center gap-3 mb-8"><div class="w-10 h-10 bg-gradient-to-br from-purple-500 to-blue-500 rounded-xl flex items-center justify-center"><i class="bi bi-shop text-white text-xl"></i></div><span class="text-white font-bold text-xl">Zyron Shop</span></div>
            <nav class="space-y-2">
                <a href="dashboard.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-white/5 transition"><i class="bi bi-speedometer2"></i> Dashboard</a>
                <a href="products.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-white/5 transition"><i class="bi bi-grid-3x3-gap-fill"></i> Products</a>
                <a href="deposit.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-white/5 transition"><i class="bi bi-wallet2"></i> Deposit</a>
                <a href="status.html" class="nav-item active flex items-center gap-3 px-4 py-3 rounded-xl"><i class="bi bi-activity"></i> Status</a>
                <a href="mykeys.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-white/5 transition"><i class="bi bi-key"></i> My Keys</a>
                <a href="orders.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-white/5 transition"><i class="bi bi-receipt"></i> Orders</a>
                <hr class="border-white/10 my-4">
                <a href="#" onclick="logout()" class="flex items-center gap-3 px-4 py-3 rounded-xl text-red-400 hover:bg-red-500/10 transition"><i class="bi bi-box-arrow-right"></i> Logout</a>
            </nav>
        </div>
    </div>
    
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

    <main class="p-4 md:p-6 transition-all">
        <div class="glass-header sticky top-0 z-50 rounded-2xl p-4 mb-6 flex justify-between items-center">
            <button class="menu-toggle text-white text-2xl" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
            <div class="flex items-center gap-4"><div class="text-right hidden sm:block"><div class="text-white text-sm font-semibold" id="userName">Loading...</div><div class="text-green-400 text-xs">Balance: ₱<span id="userBalance">0</span></div></div><div class="w-10 h-10 bg-gradient-to-br from-purple-500 to-blue-500 rounded-full flex items-center justify-center"><i class="bi bi-person text-white"></i></div></div>
        </div>

        <div class="glass-card p-6 mb-6"><h1 class="text-2xl md:text-3xl font-bold text-white mb-2">📊 Product Status</h1><p class="text-gray-400">Real-time status of all our products and services</p></div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="glass-card p-4 text-center"><i class="bi bi-check-circle-fill text-green-400 text-2xl mb-2 block"></i><span class="text-white font-bold" id="activeCount">0</span><p class="text-gray-400 text-sm">Active Products</p></div>
            <div class="glass-card p-4 text-center"><i class="bi bi-tools text-yellow-400 text-2xl mb-2 block"></i><span class="text-white font-bold" id="maintenanceCount">0</span><p class="text-gray-400 text-sm">Under Maintenance</p></div>
        </div>

        <div id="statusContainer" class="space-y-4"></div>
    </main>

    <script>
        let currentUser = null;
        let isMusicPlaying = false;

        document.addEventListener('DOMContentLoaded', () => {
            const userData = localStorage.getItem('cluddy_current_user');
            if (!userData) { window.location.href = 'login.html'; return; }
            currentUser = JSON.parse(userData);
            document.getElementById('userName').textContent = currentUser.fullname || currentUser.username;
            document.getElementById('userBalance').textContent = currentUser.balance || 0;
            loadStatus();
            loadMusic();
        });

        function loadMusic() { const musicUrl = localStorage.getItem('cluddy_music_url'); if (musicUrl) { document.getElementById('musicSource').src = musicUrl; document.getElementById('bgMusic').load(); } }
        function toggleMusic() { const music = document.getElementById('bgMusic'); const icon = document.getElementById('musicIcon'); const text = document.getElementById('musicText'); const musicUrl = localStorage.getItem('cluddy_music_url'); if (isMusicPlaying) { music.pause(); icon.className = 'bi bi-music-note'; text.textContent = 'Play Music'; icon.style.animation = 'none'; } else { if (musicUrl) { music.play().catch(e => console.log('Playback failed:', e)); icon.className = 'bi bi-music-note-beamed music-playing'; text.textContent = 'Playing...'; } } isMusicPlaying = !isMusicPlaying; }

        function loadStatus() {
            const products = JSON.parse(localStorage.getItem('cluddy_products')) || [];
            const categories = [...new Set(products.map(p => p.category).filter(c => c))];
            let active = 0, maintenance = 0;
            const container = document.getElementById('statusContainer');
            container.innerHTML = '';
            
            if (categories.length === 0) { container.innerHTML = '<div class="glass-card p-6 text-center"><p class="text-gray-400">No products available.</p></div>'; return; }
            
            categories.forEach(category => {
                const catProducts = products.filter(p => p.category === category);
                const section = document.createElement('div'); section.className = 'glass-card overflow-hidden';
                section.innerHTML = `<div class="category-header p-4 flex justify-between items-center" onclick="toggleCategory(this)"><div class="flex items-center gap-3"><i class="bi bi-folder-fill text-purple-400 text-xl"></i><h2 class="text-lg font-bold text-white">${category}</h2><span class="text-xs text-gray-400">${catProducts.length} products</span></div><i class="bi bi-chevron-down chevron text-gray-400"></i></div><div class="category-content p-4 pt-0 space-y-2">${catProducts.map(product => { if (product.status === 'active') active++; if (product.status === 'maintenance') maintenance++; let statusClass = product.status === 'active' ? 'status-active' : 'status-maintenance'; let statusText = product.status === 'active' ? 'Active' : 'Maintenance'; let statusIcon = product.status === 'active' ? 'bi-check-circle-fill' : 'bi-tools'; return `<div class="flex justify-between items-center p-3 rounded-xl bg-white/5"><div class="flex items-center gap-3"><img src="${product.image}" class="w-10 h-10 rounded-lg object-cover"><div><p class="text-white font-medium">${product.name}</p><p class="text-gray-400 text-xs">₱${product.price}</p></div></div><div><span class="status-badge ${statusClass}"><i class="bi ${statusIcon} mr-1"></i> ${statusText}</span></div></div>`; }).join('')}</div>`;
                container.appendChild(section);
            });
            document.getElementById('activeCount').textContent = active; document.getElementById('maintenanceCount').textContent = maintenance;
        }

        function toggleCategory(element) { const content = element.nextElementSibling; const chevron = element.querySelector('.chevron'); content.classList.toggle('open'); chevron.classList.toggle('rotated'); }
        function logout() { localStorage.removeItem('cluddy_current_user'); window.location.href = 'login.html'; }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('active'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('active'); }
    </script>
</body>
</html>
