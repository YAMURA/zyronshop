<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zyron Shop | Customer Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: radial-gradient(circle at 20% 15%, rgba(147,51,234,0.15), rgba(0,0,0,0) 42%),
                        linear-gradient(135deg, #07070a 0%, #0b0b12 45%, #07070a 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(10,14,28,0.6);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(147,51,234,0.16);
            border-radius: 24px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #9333ea, #3b82f6);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .btn-primary:hover { transform: translateY(-2px); filter: brightness(1.05); }
        .input-field {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: #9333ea;
            outline: none;
            box-shadow: 0 0 0 2px rgba(147,51,234,0.2);
        }
        .message-bubble {
            background: rgba(147,51,234,0.2);
            border-radius: 18px;
            padding: 10px 15px;
            max-width: 80%;
        }
        .reply-bubble {
            background: rgba(59,130,246,0.2);
            border-radius: 18px;
            padding: 10px 15px;
            max-width: 80%;
            margin-left: auto;
        }
        .chat-container {
            height: 400px;
            overflow-y: auto;
        }
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 12px;
            z-index: 1000;
            animation: slideInRight 0.3s ease;
        }
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100%;
            background: rgba(10,14,28,0.95);
            backdrop-filter: blur(18px);
            border-right: 1px solid rgba(147,51,234,0.2);
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            z-index: 100;
        }
        .sidebar.open { transform: translateX(0); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 99; }
        .overlay.active { display: block; }
        
        @media (min-width: 1024px) {
            .sidebar { transform: translateX(0); }
            .menu-toggle { display: none; }
            main { margin-left: 280px; }
        }
        @media (max-width: 1024px) { main { margin-left: 0; } }
        
        .nav-item { transition: all 0.3s ease; }
        .nav-item:hover { background: rgba(147,51,234,0.1); transform: translateX(5px); }
        .nav-item.active { background: rgba(147,51,234,0.2); color: #c084fc; }
        .glass-header {
            background: rgba(10,14,28,0.85);
            backdrop-filter: blur(18px);
            border-bottom: 1px solid rgba(147,51,234,0.2);
        }
        
        /* Music Player */
        .music-player {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 8px 12px;
            border-radius: 40px;
            border: 1px solid rgba(147,51,234,0.3);
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .music-player:hover { transform: scale(1.05); border-color: rgba(147,51,234,0.6); }
        @keyframes musicPulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
        .music-playing { animation: musicPulse 1s ease-in-out infinite; }
    </style>
</head>
<body>
    <!-- Music Player -->
    <div class="music-player" id="musicPlayer" onclick="toggleMusic()">
        <i id="musicIcon" class="bi bi-music-note"></i>
        <span id="musicText">Play Music</span>
    </div>
    <audio id="bgMusic" loop><source id="musicSource" src="" type="audio/mpeg"></audio>

    <div class="sidebar" id="sidebar">
        <div class="p-6">
            <div class="flex items-center gap-3 mb-8">
                <div class="w-10 h-10 bg-gradient-to-br from-purple-500 to-blue-500 rounded-xl flex items-center justify-center">
                    <i class="bi bi-shop text-white text-xl"></i>
                </div>
                <span class="text-white font-bold text-xl">Zyron Shop</span>
            </div>
            <nav class="space-y-2">
                <a href="dashboard.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-white/5 transition"><i class="bi bi-speedometer2"></i> Dashboard</a>
                <a href="products.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-white/5 transition"><i class="bi bi-grid-3x3-gap-fill"></i> Products</a>
                <a href="deposit.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-white/5 transition"><i class="bi bi-wallet2"></i> Deposit</a>
                <a href="status.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-white/5 transition"><i class="bi bi-activity"></i> Status</a>
                <a href="mykeys.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-white/5 transition"><i class="bi bi-key"></i> My Keys</a>
                <a href="orders.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-white/5 transition"><i class="bi bi-receipt"></i> Orders</a>
                <a href="chat.html" class="nav-item active flex items-center gap-3 px-4 py-3 rounded-xl"><i class="bi bi-chat-dots"></i> Support</a>
                <hr class="border-white/10 my-4">
                <a href="#" onclick="logout()" class="flex items-center gap-3 px-4 py-3 rounded-xl text-red-400 hover:bg-red-500/10 transition"><i class="bi bi-box-arrow-right"></i> Logout</a>
            </nav>
        </div>
    </div>
    
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

    <main class="p-4 md:p-6 transition-all">
        <div class="glass-header sticky top-0 z-50 rounded-2xl p-4 mb-6 flex justify-between items-center">
            <button class="menu-toggle text-white text-2xl" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <div class="text-white text-sm font-semibold" id="userName">Loading...</div>
                    <div class="text-green-400 text-xs">Balance: ₱<span id="userBalance">0</span></div>
                </div>
                <div class="w-10 h-10 bg-gradient-to-br from-purple-500 to-blue-500 rounded-full flex items-center justify-center"><i class="bi bi-person text-white"></i></div>
            </div>
        </div>

        <div class="glass-card p-6 mb-6">
            <h1 class="text-2xl md:text-3xl font-bold text-white mb-2">💬 Customer Support</h1>
            <p class="text-gray-400">Chat with our support team. We'll respond within 24 hours.</p>
        </div>

        <div class="glass-card p-6">
            <div class="chat-container" id="chatContainer"></div>
            
            <div class="mt-4 flex gap-3">
                <textarea id="messageInput" rows="2" placeholder="Type your message here..." class="input-field flex-1 rounded-xl p-3 text-white resize-none"></textarea>
                <button onclick="sendMessage()" class="btn-primary px-6 py-2 rounded-xl text-white font-semibold">Send</button>
            </div>
            
            <div class="mt-3">
                <label class="block text-gray-300 text-sm mb-2">Attach Image (Optional)</label>
                <input type="file" id="imageInput" accept="image/*" class="w-full rounded-xl p-2 bg-white/5 border border-white/10 text-white">
            </div>
        </div>
    </main>

    <script>
        let currentUser = null;
        let isMusicPlaying = false;

        document.addEventListener('DOMContentLoaded', () => {
            const userData = localStorage.getItem('cluddy_current_user');
            if (!userData) { window.location.href = 'login.html'; return; }
            currentUser = JSON.parse(userData);
            document.getElementById('userName').textContent = currentUser.fullname || currentUser.username;
            document.getElementById('userBalance').textContent = currentUser.balance || 0;
            loadChats();
            loadMusic();
        });

        function loadMusic() {
            const musicUrl = localStorage.getItem('cluddy_music_url');
            if (musicUrl) { document.getElementById('musicSource').src = musicUrl; document.getElementById('bgMusic').load(); }
        }

        function toggleMusic() {
            const music = document.getElementById('bgMusic');
            const icon = document.getElementById('musicIcon');
            const text = document.getElementById('musicText');
            const musicUrl = localStorage.getItem('cluddy_music_url');
            if (isMusicPlaying) { music.pause(); icon.className = 'bi bi-music-note'; text.textContent = 'Play Music'; icon.style.animation = 'none'; }
            else { if (musicUrl) { music.play().catch(e => console.log('Playback failed:', e)); icon.className = 'bi bi-music-note-beamed music-playing'; text.textContent = 'Playing...'; } }
            isMusicPlaying = !isMusicPlaying;
        }

        function loadChats() {
            const chats = JSON.parse(localStorage.getItem('cluddy_support_chats')) || [];
            const userChats = chats.filter(c => c.userId === currentUser.id);
            const container = document.getElementById('chatContainer');
            
            if (userChats.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-400 py-8">No messages yet. Start a conversation!</div>';
                return;
            }
            
            container.innerHTML = userChats.map(chat => `
                <div class="mb-3 ${chat.isAdmin ? 'text-right' : 'text-left'}">
                    <div class="${chat.isAdmin ? 'reply-bubble' : 'message-bubble'} inline-block">
                        <p class="text-white text-sm">${chat.message}</p>
                        ${chat.image ? `<img src="${chat.image}" class="mt-2 w-32 h-32 object-cover rounded-lg">` : ''}
                        <p class="text-gray-500 text-xs mt-1">${new Date(chat.timestamp).toLocaleString()}</p>
                    </div>
                </div>
            `).join('');
            
            container.scrollTop = container.scrollHeight;
        }

        function sendMessage() {
            const message = document.getElementById('messageInput').value.trim();
            const imageFile = document.getElementById('imageInput').files[0];
            
            if (!message && !imageFile) {
                showNotification('Please enter a message or attach an image', 'error');
                return;
            }
            
            if (imageFile) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const chat = {
                        id: Date.now(),
                        userId: currentUser.id,
                        username: currentUser.username,
                        message: message || 'Sent an image',
                        image: e.target.result,
                        timestamp: new Date().toISOString(),
                        isAdmin: false,
                        replied: false
                    };
                    saveChat(chat);
                };
                reader.readAsDataURL(imageFile);
            } else {
                const chat = {
                    id: Date.now(),
                    userId: currentUser.id,
                    username: currentUser.username,
                    message: message,
                    timestamp: new Date().toISOString(),
                    isAdmin: false,
                    replied: false
                };
                saveChat(chat);
            }
        }

        function saveChat(chat) {
            const chats = JSON.parse(localStorage.getItem('cluddy_support_chats')) || [];
            chats.push(chat);
            localStorage.setItem('cluddy_support_chats', JSON.stringify(chats));
            
            // Send to Telegram
            sendTelegramNotification(`💬 NEW SUPPORT MESSAGE\nFrom: ${chat.username}\nMessage: ${chat.message}\nTime: ${new Date(chat.timestamp).toLocaleString()}`);
            
            document.getElementById('messageInput').value = '';
            document.getElementById('imageInput').value = '';
            loadChats();
            showNotification('Message sent! Support will respond soon.', 'success');
        }

        function sendTelegramNotification(message) {
            const BOT_TOKEN = '8499837362:AAEFJQiF0wtkwtY7ZJHirPpdxEJ2z2tKvYo';
            const ADMIN_ID = '5318214551';
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: ADMIN_ID, text: message })
            }).catch(console.error);
        }

        function showNotification(msg, type) {
            const existing = document.querySelectorAll('.notification');
            existing.forEach(n => n.remove());
            const notification = document.createElement('div');
            notification.className = `notification ${type === 'success' ? 'bg-green-500' : 'bg-red-500'} text-white`;
            notification.innerHTML = `<i class="bi bi-${type === 'success' ? 'check-circle' : 'x-circle'} mr-2"></i>${msg}`;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }

        function logout() { localStorage.removeItem('cluddy_current_user'); window.location.href = 'login.html'; }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('active'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('active'); }
    </script>
</body>
</html>
