<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zyron Shop | Promos & Discounts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background: radial-gradient(circle at 20% 15%, rgba(147,51,234,0.15), rgba(0,0,0,0) 42%), linear-gradient(135deg, #07070a 0%, #0b0b12 45%, #07070a 100%); min-height: 100vh; }
        .glass-card { background: rgba(10,14,28,0.6); backdrop-filter: blur(14px); border: 1px solid rgba(147,51,234,0.16); border-radius: 24px; }
        .btn-primary { background: linear-gradient(135deg, #9333ea, #3b82f6); transition: all 0.3s ease; cursor: pointer; }
        .btn-primary:hover { transform: translateY(-2px); filter: brightness(1.05); }
        .promo-card { transition: all 0.3s ease; cursor: pointer; position: relative; overflow: hidden; }
        .promo-card:hover { transform: translateY(-4px); border-color: rgba(147,51,234,0.4); }
        .promo-badge { position: absolute; top: 10px; right: 10px; background: linear-gradient(135deg, #f59e0b, #ea580c); padding: 4px 8px; border-radius: 20px; font-size: 10px; font-weight: bold; color: white; }
        .countdown { font-family: monospace; font-size: 14px; }
        .sidebar { position: fixed; left: 0; top: 0; width: 280px; height: 100%; background: rgba(10,14,28,0.95); backdrop-filter: blur(18px); border-right: 1px solid rgba(147,51,234,0.2); transform: translateX(-100%); transition: transform 0.3s ease; z-index: 100; }
        .sidebar.open { transform: translateX(0); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 99; }
        .overlay.active { display: block; }
        @media (min-width: 1024px) { .sidebar { transform: translateX(0); } .menu-toggle { display: none; } main { margin-left: 280px; } }
        @media (max-width: 1024px) { main { margin-left: 0; } }
        .nav-item { transition: all 0.3s ease; }
        .nav-item:hover { background: rgba(147,51,234,0.1); transform: translateX(5px); }
        .nav-item.active { background: rgba(147,51,234,0.2); color: #c084fc; }
        .glass-header { background: rgba(10,14,28,0.85); backdrop-filter: blur(18px); border-bottom: 1px solid rgba(147,51,234,0.2); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { max-width: 500px; width: 90%; max-height: 85vh; overflow-y: auto; }
        .music-player { position: fixed; bottom: 20px; left: 20px; z-index: 1000; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 8px 12px; border-radius: 40px; border: 1px solid rgba(147,51,234,0.3); display: flex; align-items: center; gap: 10px; cursor: pointer; transition: all 0.3s ease; }
        .music-player:hover { transform: scale(1.05); border-color: rgba(147,51,234,0.6); }
        @keyframes musicPulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
        .music-playing { animation: musicPulse 1s ease-in-out infinite; }
    </style>
</head>
<body>
    <div class="music-player" id="musicPlayer" onclick="toggleMusic()"><i id="musicIcon" class="bi bi-music-note"></i><span id="musicText">Play Music</span></div>
    <audio id="bgMusic" loop><source id="musicSource" src="" type="audio/mpeg"></audio>

    <div class="sidebar" id="sidebar"><div class="p-6"><div class="flex items-center gap-3 mb-8"><div class="w-10 h-10 bg-gradient-to-br from-purple-500 to-blue-500 rounded-xl flex items-center justify-center"><i class="bi bi-shop text-white text-xl"></i></div><span class="text-white font-bold text-xl">Zyron Shop</span></div><nav class="space-y-2"><a href="dashboard.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-white/5 transition"><i class="bi bi-speedometer2"></i> Dashboard</a><a href="products.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-white/5 transition"><i class="bi bi-grid-3x3-gap-fill"></i> Products</a><a href="deposit.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-white/5 transition"><i class="bi bi-wallet2"></i> Deposit</a><a href="status.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-white/5 transition"><i class="bi bi-activity"></i> Status</a><a href="mykeys.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-white/5 transition"><i class="bi bi-key"></i> My Keys</a><a href="orders.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-white/5 transition"><i class="bi bi-receipt"></i> Orders</a><a href="promos.html" class="nav-item active flex items-center gap-3 px-4 py-3 rounded-xl"><i class="bi bi-fire"></i> Promos</a><hr class="border-white/10 my-4"><a href="#" onclick="logout()" class="flex items-center gap-3 px-4 py-3 rounded-xl text-red-400 hover:bg-red-500/10 transition"><i class="bi bi-box-arrow-right"></i> Logout</a></nav></div></div>
    
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

    <main class="p-4 md:p-6 transition-all">
        <div class="glass-header sticky top-0 z-50 rounded-2xl p-4 mb-6 flex justify-between items-center"><button class="menu-toggle text-white text-2xl" onclick="toggleSidebar()"><i class="bi bi-list"></i></button><div class="flex items-center gap-4"><div class="text-right hidden sm:block"><div class="text-white text-sm font-semibold" id="userName">Loading...</div><div class="text-green-400 text-xs">Balance: ₱<span id="userBalance">0</span></div></div><div class="w-10 h-10 bg-gradient-to-br from-purple-500 to-blue-500 rounded-full flex items-center justify-center"><i class="bi bi-person text-white"></i></div></div></div>

        <div class="glass-card p-6 mb-6"><div class="flex justify-between items-center"><div><h1 class="text-2xl md:text-3xl font-bold text-white mb-2">🔥 Active Promos & Discounts</h1><p class="text-gray-400">Grab these limited-time offers before they expire!</p></div></div></div>

        <div id="promosGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <div id="promoModal" class="modal"><div class="modal-content glass-card p-6"><div class="flex justify-between items-center mb-4"><h2 class="text-xl font-bold text-white" id="promoModalTitle"></h2><button onclick="closeModal()" class="text-gray-400 hover:text-white text-2xl">&times;</button></div><div class="space-y-4"><p id="promoModalDesc" class="text-gray-300"></p><div class="flex justify-between items-center"><div><span class="text-gray-400 line-through" id="promoOriginalPrice"></span><span class="text-2xl font-bold text-purple-400 ml-2" id="promoModalPrice"></span></div><span class="text-green-400 text-sm" id="promoDiscount"></span></div><div class="p-3 rounded-xl bg-white/5"><p class="text-gray-400 text-sm">Promo Code: <code id="promoCode" class="text-purple-400"></code></p><p class="text-gray-400 text-sm mt-1">Valid until: <span id="promoExpiry"></span></p></div><button onclick="buyWithPromo()" class="btn-primary w-full py-3 rounded-xl text-white font-semibold"><i class="bi bi-cart-plus"></i> Claim Promo</button></div></div></div>

    <script>
        let currentUser = null, promos = [], isMusicPlaying = false;
        document.addEventListener('DOMContentLoaded', () => {
            const userData = localStorage.getItem('cluddy_current_user');
            if (!userData) { window.location.href = 'login.html'; return; }
            currentUser = JSON.parse(userData);
            document.getElementById('userName').textContent = currentUser.fullname || currentUser.username;
            document.getElementById('userBalance').textContent = currentUser.balance || 0;
            loadPromos(); loadMusic();
        });
        function loadMusic() { const musicUrl = localStorage.getItem('cluddy_music_url'); if (musicUrl) { document.getElementById('musicSource').src = musicUrl; document.getElementById('bgMusic').load(); } }
        function toggleMusic() { const music = document.getElementById('bgMusic'); const icon = document.getElementById('musicIcon'); const text = document.getElementById('musicText'); const musicUrl = localStorage.getItem('cluddy_music_url'); if (isMusicPlaying) { music.pause(); icon.className = 'bi bi-music-note'; text.textContent = 'Play Music'; icon.style.animation = 'none'; } else { if (musicUrl) { music.play().catch(e => console.log('Playback failed:', e)); icon.className = 'bi bi-music-note-beamed music-playing'; text.textContent = 'Playing...'; } } isMusicPlaying = !isMusicPlaying; }
        function loadPromos() { promos = JSON.parse(localStorage.getItem('cluddy_promos')); if (!promos || promos.length === 0) { promos = [{ id: 1, name: "New Year Sale", description: "Get 20% off on all MLBB accounts", discount: 20, originalPrice: 1500, promoPrice: 1200, code: "NY2026", expiry: new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString(), productId: 1 }]; localStorage.setItem('cluddy_promos', JSON.stringify(promos)); } displayPromos(); }
        function displayPromos() { const container = document.getElementById('promosGrid'); if (promos.length === 0) { container.innerHTML = '<p class="text-gray-400 text-center col-span-full py-8">No active promos at the moment.</p>'; return; } container.innerHTML = promos.map(promo => { const expiryDate = new Date(promo.expiry); const isExpired = expiryDate < new Date(); return `<div class="glass-card promo-card p-5 ${isExpired ? 'opacity-50' : ''}" onclick="viewPromo(${promo.id})"><div class="relative"><div class="promo-badge">-${promo.discount}% OFF</div><div class="flex items-center gap-3 mb-3"><div class="w-12 h-12 bg-orange-500/20 rounded-xl flex items-center justify-center"><i class="bi bi-tag text-orange-400 text-xl"></i></div><div><h3 class="text-white font-bold">${promo.name}</h3><p class="text-gray-400 text-sm">${promo.description.substring(0, 50)}...</p></div></div><div class="flex justify-between items-center mt-3"><div><span class="text-gray-400 line-through text-sm">₱${promo.originalPrice}</span><span class="text-purple-400 font-bold text-lg ml-2">₱${promo.promoPrice}</span></div><div class="text-right"><p class="text-green-400 text-xs">Save ₱${promo.originalPrice - promo.promoPrice}</p></div></div><div class="mt-3 pt-3 border-t border-white/10"><code class="text-purple-400 text-xs">Code: ${promo.code}</code></div></div></div>`; }).join(''); }
        function viewPromo(promoId) { const promo = promos.find(p => p.id === promoId); if (!promo) return; if (new Date(promo.expiry) < new Date()) { showNotification('This promo has expired!', 'error'); return; } document.getElementById('promoModalTitle').textContent = promo.name; document.getElementById('promoModalDesc').textContent = promo.description; document.getElementById('promoOriginalPrice').textContent = `₱${promo.originalPrice}`; document.getElementById('promoModalPrice').textContent = `₱${promo.promoPrice}`; document.getElementById('promoDiscount').textContent = `Save ${promo.discount}%`; document.getElementById('promoCode').textContent = promo.code; document.getElementById('promoExpiry').textContent = new Date(promo.expiry).toLocaleDateString(); window.currentPromo = promo; document.getElementById('promoModal').style.display = 'flex'; }
        function buyWithPromo() { const promo = window.currentPromo; if (!promo) return; const order = { orderId: 'ORD' + Date.now(), userId: currentUser.id, username: currentUser.username, productName: promo.name, amount: promo.promoPrice, paymentMethod: 'promo', promoCode: promo.code, discount: promo.discount, timestamp: new Date().toISOString(), status: 'pending' }; const orders = JSON.parse(localStorage.getItem('cluddy_orders')) || []; orders.push(order); localStorage.setItem('cluddy_orders', JSON.stringify(orders)); sendTelegramNotification(`🛒 NEW ORDER (PROMO)\nOrder #${order.orderId}\nCustomer: ${order.username}\nProduct: ${order.productName}\nAmount: ₱${order.amount}\nPromo: ${order.promoCode}`); showNotification(`Promo applied! Order placed for ₱${promo.promoPrice}`, 'success'); closeModal(); }
        function sendTelegramNotification(message) { const BOT_TOKEN = '8499837362:AAEFJQiF0wtkwtY7ZJHirPpdxEJ2z2tKvYo'; const ADMIN_ID = '5318214551'; fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ chat_id: ADMIN_ID, text: message }) }).catch(console.error); }
        function closeModal() { document.getElementById('promoModal').style.display = 'none'; }
        function showNotification(msg, type) { const notification = document.createElement('div'); notification.className = `fixed top-4 right-4 px-4 py-3 rounded-xl shadow-lg z-50 transition-all ${type === 'success' ? 'bg-green-500' : 'bg-red-500'} text-white`; notification.innerHTML = `<i class="bi bi-${type === 'success' ? 'check-circle' : 'x-circle'} mr-2"></i>${msg}`; document.body.appendChild(notification); setTimeout(() => notification.remove(), 3000); }
        function logout() { localStorage.removeItem('cluddy_current_user'); window.location.href = 'login.html'; }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('active'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('active'); }
    </script>
</body>
</html>
