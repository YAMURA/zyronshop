<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛍️</text></svg>">
    <title>Zyron Shop | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: radial-gradient(circle at 20% 15%, rgba(147,51,234,0.22), rgba(0,0,0,0) 42%),
                        radial-gradient(circle at 85% 70%, rgba(59,130,246,0.18), rgba(0,0,0,0) 45%),
                        linear-gradient(135deg, #07070a 0%, #0b0b12 45%, #07070a 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        .glass-card {
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            background: linear-gradient(180deg, rgba(22,16,40,0.62), rgba(14,12,24,0.50));
            border: 1px solid rgba(147,51,234,0.22);
            border-radius: 28px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.55), 0 0 80px rgba(147,51,234,0.26);
        }
        
        .input-field {
            background: linear-gradient(180deg, rgba(147,51,234,0.08), rgba(255,255,255,0.02));
            border-color: rgba(147,51,234,0.16) !important;
            transition: all 0.3s ease;
        }
        
        .input-field:focus {
            box-shadow: 0 0 0 1px rgba(147,51,234,0.25), 0 0 26px rgba(147,51,234,0.20);
            transform: translateY(-2px);
            outline: none;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, rgba(124,58,237,0.92), rgba(91,33,182,0.92));
            border: 1px solid rgba(186,85,255,0.45);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
            box-shadow: 0 14px 38px rgba(124,58,237,0.48);
        }
        
        .btn-primary:active {
            transform: translateY(0px);
        }
        
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0a 0%, #121212 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s;
        }
        
        .splash-logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #9333ea, #3b82f6);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 1.6s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 45px rgba(147,51,234,0.35); }
            50% { transform: scale(1.1); box-shadow: 0 0 65px rgba(147,51,234,0.55); }
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-in { animation: fadeInUp 0.6s ease-out; }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(147,51,234,0.6);
            border-radius: 50%;
            animation: float-particle 15s infinite;
        }
        
        @keyframes float-particle {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) translateX(100px); opacity: 0; }
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 12px;
            z-index: 1000;
            animation: slideInRight 0.3s ease;
        }
        
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div id="splashScreen" class="splash-screen">
        <div class="text-center">
            <div class="splash-logo mx-auto">
                <i class="bi bi-shop text-white text-4xl"></i>
            </div>
            <div class="text-white mt-4 text-sm font-semibold tracking-wider">zyron SHOP</div>
            <div class="mt-3 w-32 h-1 bg-white/10 rounded-full overflow-hidden mx-auto">
                <div class="h-full w-1/2 bg-gradient-to-r from-purple-500 to-blue-500 rounded-full animate-pulse"></div>
            </div>
        </div>
    </div>

    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="particle" style="left: 10%; animation-delay: 0s;"></div>
        <div class="particle" style="left: 30%; animation-delay: 2s;"></div>
        <div class="particle" style="left: 50%; animation-delay: 4s;"></div>
        <div class="particle" style="left: 70%; animation-delay: 1s;"></div>
        <div class="particle" style="left: 90%; animation-delay: 3s;"></div>
    </div>

    <div class="max-w-md w-full animate-in">
        <div class="glass-card p-8">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-gradient-to-br from-purple-500 to-blue-500 rounded-2xl flex items-center justify-center mx-auto mb-3">
                    <i class="bi bi-shop text-white text-2xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-white">Welcome Back</h2>
                <p class="text-gray-400 text-sm mt-1">Sign in to your Zyron Shop account</p>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="mb-4">
                    <label class="block text-gray-300 text-sm mb-2">
                        <i class="bi bi-person mr-1"></i> Username
                    </label>
                    <input type="text" id="username" required
                        class="input-field w-full rounded-xl p-3 bg-transparent border text-white placeholder-gray-500 focus:outline-none"
                        placeholder="Enter your username">
                </div>

                <div class="mb-6">
                    <label class="block text-gray-300 text-sm mb-2">
                        <i class="bi bi-lock mr-1"></i> Password
                    </label>
                    <input type="password" id="password" required
                        class="input-field w-full rounded-xl p-3 bg-transparent border text-white placeholder-gray-500 focus:outline-none"
                        placeholder="Enter your password">
                </div>

                <button type="submit" class="btn-primary w-full py-3 rounded-xl text-white font-semibold">
                    <i class="bi bi-box-arrow-in-right mr-2"></i> Sign In
                </button>
            </form>

            <div class="mt-6 text-center">
                <a href="register.html" class="text-purple-400 hover:text-purple-300 text-sm transition">
                    Don't have an account? <i class="bi bi-arrow-right"></i> Register
                </a>
            </div>

            <div class="mt-4 pt-4 border-t border-white/10 text-center">
                <p class="text-gray-500 text-xs">© 2026 Zyron Shop. All rights reserved.</p>
            </div>
        </div>
    </div>

    <script>
        // Initialize default admin if no users exist
        function initUsers() {
            let users = JSON.parse(localStorage.getItem('zyron_users'));
            if (!users || users.length === 0) {
                const defaultAdmin = {
                    id: Date.now(),
                    fullname: 'Administrator',
                    email: 'admin@zyron.com',
                    username: 'admin',
                    password: 'admin123',
                    balance: 0,
                    role: 'admin',
                    createdAt: new Date().toISOString()
                };
                users = [defaultAdmin];
                localStorage.setItem('zyron_users', JSON.stringify(users));
            }
            return users;
        }

        // Splash screen
        window.addEventListener('load', function() {
            initUsers();
            setTimeout(function() {
                const splash = document.getElementById('splashScreen');
                splash.style.opacity = '0';
                setTimeout(function() {
                    splash.style.display = 'none';
                }, 500);
            }, 1500);
        });

        function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            const users = JSON.parse(localStorage.getItem('zyron_users')) || [];
            const user = users.find(u => u.username === username && u.password === password);

            if (user) {
                // Store current user
                localStorage.setItem('zyron_current_user', JSON.stringify(user));
                showNotification('Login successful! Redirecting...', 'success');
                
                // Redirect based on role
                setTimeout(() => {
                    if (user.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                }, 1000);
            } else {
                showNotification('Invalid username or password!', 'error');
            }
        }

        function showNotification(msg, type) {
            // Remove existing notifications
            const existing = document.querySelectorAll('.notification');
            existing.forEach(n => n.remove());
            
            const notification = document.createElement('div');
            notification.className = `notification ${type === 'success' ? 'bg-green-500' : 'bg-red-500'} text-white`;
            notification.innerHTML = `<i class="bi bi-${type === 'success' ? 'check-circle' : 'x-circle'} mr-2"></i>${msg}`;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }
    </script>
</body>
</html>
